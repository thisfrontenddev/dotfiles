# cybr component registry. Format: one [section] per component.
#   repo    = git clone URL
#   target  = config dir relative to $HOME
#   entry   = entry file that becomes the loader (relative to target); empty = no loader (full-file/conf.d tool)
#   style   = include style: hypr | jsonc | none
#   deps    = space-separated package names (installed via the detected PM)

[cybrcolors]
repo = "https://github.com/cybrcore/cybrcolors.git"
target = ".local/share/cybrdots/cybrcolors"
entry = ""
style = "none"
deps = ""

[cybr-hyprland]
repo = "https://github.com/cybrcore/cybr-hyprland.git"
target = ".config/hypr"
entry = "hyprland.conf"
style = "hypr"
deps = "hyprland hyprpaper hypridle hyprlock"

[cybr-waybar]
repo = "https://github.com/cybrcore/cybr-waybar.git"
target = ".config/waybar"
entry = "config.jsonc"
style = "jsonc"
deps = "waybar playerctl lm_sensors"
