# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

#autogenerated = 1

source = ~/.config/hypr/monitors.conf

# CYBR theme from upstream cybr-hyprland (colors/blur/shadow/groupbar).
# Read live from the cache; update with:
#   git -C ~/.local/share/cybrdots/cybr-hyprland pull
# theme.conf sources vars.conf, which is symlinked into this dir from the cache.
source = ~/.local/share/cybrdots/cybr-hyprland/theme.conf

# ── My overrides on top of the upstream theme (sourced last, so they win) ──
# Re-enable animations (upstream's theme.conf disables them).
animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 4, snappy
    animation = windowsOut, 1, 4, snappy, popin 80%
    animation = border, 1, 6, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 4, snappy
}

$mainMod = SUPER
$terminal = ghostty 
$fileManager = thunar
$menu = rofi -show run

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen, 1          # maximize (keeps gaps/bar)
bind = $mainMod SHIFT, F, fullscreen, 0    # true fullscreen (covers everything)

exec-once = waybar   # upstream cybr-waybar launches plainly (see ~/.config/waybar -> cache)
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprpm reload -n   # load hyprpm plugins (hyprbars) at startup

misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

render {
    cm_auto_hdr = 2
}

# hyprbars: adds titlebars to windows. Requires the hyprbars plugin
# (installed via: hyprpm add https://github.com/hyprwm/hyprland-plugins)
plugin {
    hyprbars {
        bar_height = 28
        bar_color = rgb(030408)          # CYBR background
        col.text = rgb(898D99)           # CYBR foreground
        bar_text_font = GeistMono NF
        bar_text_size = 14
        bar_text_align = left
        bar_buttons_alignment = left
        bar_padding = 16                 # horizontal inset (leading offset of the button group)
        bar_button_padding = 8           # spacing between the buttons
        bar_part_of_window = true
        bar_precedence_over_border = true

        # buttons render right-to-left: close (red), minimize (yellow), maximize (green)
        # colors come from the CYBR palette vars (vars.conf): $re0 / $ye0 / $gr0
        hyprbars-button = rgb($re0), 13, , hyprctl dispatch killactive
        # minimize/restore toggle: stash in special:minimized, or (if already there)
        # send the window back to its origin workspace. See scripts/minimize-toggle.sh
        hyprbars-button = rgb($ye0), 13, , /home/alt/.config/hypr/scripts/minimize-toggle.sh
        # maximize: fill the workspace (fullscreen 1 keeps gaps/bar; not true fullscreen)
        hyprbars-button = rgb($gr0), 13, , hyprctl dispatch fullscreen 1
    }
}

bind = SUPER, SPACE, exec, rofi -show drun
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ── Scratchpad ("minimize") ──
# Stash the focused window in a hidden special workspace…
# (silent = move the window away WITHOUT following it, so your view stays put)
bind = $mainMod, H, movetoworkspacesilent, special:hidden
# …and toggle that scratchpad into/out of view to get windows back.
bind = $mainMod SHIFT, H, togglespecialworkspace, hidden
# Toggle the "minimized" scratchpad (windows sent there via the titlebar button).
bind = $mainMod SHIFT, M, togglespecialworkspace, minimized

# ── Workspaces ──
# ALT + {n}: switch to workspace n
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10
# ALT + SHIFT + {n}: move focused window to workspace n
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
