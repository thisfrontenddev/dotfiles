# ─── Appearance ─────────────────────────────────────────────────────

general {
    gaps_in = 3
    gaps_out = 16
    border_size = 2

    # CYBRland border colors
    col.active_border = rgb(F24848)
    col.inactive_border = rgb(05070D)

    layout = dwindle

    snap {
        enabled = true
    }
}

decoration {
    rounding = 0

    # Blur
    blur {
        enabled = true
        size = 3
        passes = 2
        new_optimizations = true
        ignore_opacity = false
    }

    # Shadows
    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(F2484860)
        color_inactive = rgba(03040830)
    }
}

# ─── Animations ─────────────────────────────────────────────────────

animations {
    enabled = true

    bezier = snappy, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 4, snappy
    animation = windowsOut, 1, 4, snappy, popin 80%
    animation = border, 1, 6, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 4, snappy
}

# ─── Layouts ────────────────────────────────────────────────────────

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ─── Groups (tabbed) ───────────────────────────────────────────────

group {
    # CYBRland group border colors
    col.border_active = rgb(F24848)
    col.border_inactive = rgb(05070D)

    groupbar {
        enabled = true
        font_family = GeistMono Nerd Font
        font_size = 10
        height = 18
        col.active = rgb(F24848)
        col.inactive = rgb(331215)
        text_color = rgb(030408)
    }
}

# ─── Misc ───────────────────────────────────────────────────────────

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
