# Persistent virtual sinks for audio channel separation
# Routes to the default output — works with any audio device
# ChatMix dial support provided by nova-chatmix service (HID only)
context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "NovaGame"
            capture.props = {
                media.class    = Audio/Sink
                node.name      = NovaGame
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = nova-game-output
                audio.position = [ FL FR ]
            }
        }
    }
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "NovaChat"
            capture.props = {
                media.class    = Audio/Sink
                node.name      = NovaChat
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = nova-chat-output
                audio.position = [ FL FR ]
            }
        }
    }
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "NovaMedia"
            capture.props = {
                media.class    = Audio/Sink
                node.name      = NovaMedia
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name      = nova-media-output
                audio.position = [ FL FR ]
            }
        }
    }
]
