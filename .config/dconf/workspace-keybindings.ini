# GNOME Workspace Keybindings — load with: dconf load / < ~/.config/dconf/workspace-keybindings.ini

[org/gnome/mutter]
dynamic-workspaces=false

[org/gnome/desktop/wm/preferences]
num-workspaces=19

[org/gnome/desktop/wm/keybindings]
# Alt+1-9 → workspaces 1-9
switch-to-workspace-1=['<Alt>1']
switch-to-workspace-2=['<Alt>2']
switch-to-workspace-3=['<Alt>3']
switch-to-workspace-4=['<Alt>4']
switch-to-workspace-5=['<Alt>5']
switch-to-workspace-6=['<Alt>6']
switch-to-workspace-7=['<Alt>7']
switch-to-workspace-8=['<Alt>8']
switch-to-workspace-9=['<Alt>9']
# Alt+0 → workspace 10
switch-to-workspace-10=['<Alt>0']
# Disable unused directional workspace switching
switch-to-workspace-left=@as []
switch-to-workspace-right=@as []
switch-to-workspace-down=@as []
switch-to-workspace-up=@as []
switch-to-workspace-last=@as []

# Alt+Shift+1-9,0 → move window to workspace
move-to-workspace-1=['<Alt><Shift>1']
move-to-workspace-2=['<Alt><Shift>2']
move-to-workspace-3=['<Alt><Shift>3']
move-to-workspace-4=['<Alt><Shift>4']
move-to-workspace-5=['<Alt><Shift>5']
move-to-workspace-6=['<Alt><Shift>6']
move-to-workspace-7=['<Alt><Shift>7']
move-to-workspace-8=['<Alt><Shift>8']
move-to-workspace-9=['<Alt><Shift>9']
move-to-workspace-10=['<Alt><Shift>0']
move-to-workspace-left=@as []
move-to-workspace-right=@as []
move-to-workspace-down=@as []
move-to-workspace-up=@as []

# Close window: Alt+Q (like Cmd+Q on macOS)
close=['<Alt>q']
# Minimize: disabled (tiling WM doesn't need it)
minimize=@as []

[org/gnome/shell/keybindings]
# Clear all switch-to-application bindings (they conflict with Alt+N)
switch-to-application-1=@as []
switch-to-application-2=@as []
switch-to-application-3=@as []
switch-to-application-4=@as []
switch-to-application-5=@as []
switch-to-application-6=@as []
switch-to-application-7=@as []
switch-to-application-8=@as []
switch-to-application-9=@as []

# Forge tiling keybindings — Aerospace-style
[org/gnome/shell/extensions/forge/keybindings]
# Focus: Ctrl+Alt+H/J/K/L
window-focus-left=['<Ctrl><Alt>h']
window-focus-down=['<Ctrl><Alt>j']
window-focus-up=['<Ctrl><Alt>k']
window-focus-right=['<Ctrl><Alt>l']

# Move windows: Ctrl+Alt+Shift+H/J/K/L
window-move-left=['<Ctrl><Alt><Shift>h']
window-move-down=['<Ctrl><Alt><Shift>j']
window-move-up=['<Ctrl><Alt><Shift>k']
window-move-right=['<Ctrl><Alt><Shift>l']

# Swap windows: Ctrl+Super+H/J/K/L
window-swap-left=['<Ctrl><Super>h']
window-swap-down=['<Ctrl><Super>j']
window-swap-up=['<Ctrl><Super>k']
window-swap-right=['<Ctrl><Super>l']

# Toggle float: Ctrl+Alt+Enter (like Aerospace)
window-toggle-float=['<Ctrl><Alt>Return']
# Toggle tiling for workspace
workspace-active-tile-toggle=['<Shift><Super>w']

# Layout toggles
con-split-layout-toggle=['<Ctrl><Alt>e']
con-stacked-layout-toggle=['<Ctrl><Alt>a']

# Resize
window-resize-left-increase=['<Ctrl><Super>y']
window-resize-right-increase=['<Ctrl><Super>o']
window-resize-top-increase=['<Ctrl><Super>i']
window-resize-bottom-increase=['<Ctrl><Super>u']
window-resize-left-decrease=['<Ctrl><Shift><Super>y']
window-resize-right-decrease=['<Ctrl><Shift><Super>o']
window-resize-top-decrease=['<Ctrl><Shift><Super>i']
window-resize-bottom-decrease=['<Ctrl><Shift><Super>u']

# Gap controls
window-gap-size-increase=['<Ctrl><Super>plus']
window-gap-size-decrease=['<Ctrl><Super>minus']

# Disable bindings that conflict
prefs-tiling-toggle=@as []
focus-border-toggle=@as []
con-split-horizontal=@as []
con-split-vertical=@as []
con-tabbed-layout-toggle=@as []
con-tabbed-showtab-decoration-toggle=@as []

[org/gnome/shell/extensions/forge]
window-gap-size=uint32 4
window-gap-size-increment=uint32 2
window-gap-hidden-on-single=true
